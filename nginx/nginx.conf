# Nginx reverse proxy in front of the Spring Boot app.
# Replace mydomain.com with your real domain before deploying.
#
# Initial HTTP-only config (use this first to obtain the certificate via
# certbot), then switch to the HTTPS server block below once the
# certificate exists. See README.md "HTTPS via Let's Encrypt" section.

server {
    listen 80;
    server_name mydomain.com www.mydomain.com;

    # Used by certbot's HTTP-01 challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
    }
}

