services:
  postgres:
    image: postgres:16-alpine
    container_name: link-tracker-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-linktracker}
      POSTGRES_USER: ${DB_USER:-linktracker}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-linktracker}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-linktracker}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: link-tracker-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-linktracker}
      DB_USER: ${DB_USER:-linktracker}
      DB_PASSWORD: ${DB_PASSWORD:-linktracker}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme123}
      SERVER_PORT: 8080
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    ports:
      - "8080:8080"

  # Optional reverse proxy / TLS terminator. Comment out if you prefer to run
  # your own Nginx / Caddy / Traefik instance on the host instead.
  nginx:
    image: nginx:1.27-alpine
    container_name: link-tracker-nginx
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - certbot-www:/var/www/certbot
      - certbot-conf:/etc/letsencrypt

volumes:
  pgdata:
  certbot-www:
  certbot-conf:
