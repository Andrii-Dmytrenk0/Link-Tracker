<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Influencers')}"></head>
<body>
<nav th:replace="~{fragments/layout :: navbar}"></nav>
<div class="container-fluid px-4">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <h2 class="m-0">Influencers</h2>
        <a href="/admin/influencers/new" class="btn btn-dark"><i class="bi bi-plus-lg"></i> New influencer</a>
    </div>

    <form class="row g-2 mb-3" method="get" th:action="@{/admin/influencers}">
        <div class="col-auto">
            <input type="text" name="search" th:value="${search}" class="form-control" placeholder="Search name or code"/>
        </div>
        <div class="col-auto">
            <button class="btn btn-outline-dark" type="submit"><i class="bi bi-search"></i> Search</button>
        </div>
        <div class="col-auto ms-auto">
            <a class="btn btn-outline-secondary" th:href="@{/api/export/csv}"><i class="bi bi-filetype-csv"></i> Export CSV</a>
            <a class="btn btn-outline-secondary" th:href="@{/api/export/excel}"><i class="bi bi-filetype-xlsx"></i> Excel</a>
            <a class="btn btn-outline-secondary" th:href="@{/api/export/pdf}"><i class="bi bi-filetype-pdf"></i> PDF</a>
        </div>
    </form>

    <div class="card">
        <table class="table table-hover align-middle mb-0">
            <thead class="table-light">
            <tr>
                <th>Ім'я</th>
                <th>Код</th>
                <th>Tracking link</th>
                <th>Переходів</th>
                <th>Status</th>
                <th class="text-end">Дії</th>
            </tr>
            </thead>
            <tbody>
            <tr th:each="inf : ${influencers.content}">
                <td th:text="${inf.name}">Anna</td>
                <td><code th:text="${inf.code}">anna</code></td>
                <td>
                    <a th:href="${inf.trackingUrl}" th:text="${inf.trackingUrl}" target="_blank" class="small"></a>
                </td>
                <td th:text="${inf.totalClicks}">0</td>
                <td>
                    <span th:if="${inf.active}" class="badge bg-success">Active</span>
                    <span th:unless="${inf.active}" class="badge bg-secondary">Disabled</span>
                </td>
                <td class="text-end">
                    <a th:href="@{/admin/influencers/{id}(id=${inf.id})}" class="btn btn-sm btn-outline-dark">
                        <i class="bi bi-bar-chart"></i> Статистика
                    </a>
                    <a th:href="@{/admin/influencers/{id}/edit(id=${inf.id})}" class="btn btn-sm btn-outline-secondary">
                        <i class="bi bi-pencil"></i>
                    </a>
                    <button type="button" class="btn btn-sm btn-outline-danger"
                            th:onclick="'deleteInfluencer(' + ${inf.id} + ')'">
                        <i class="bi bi-trash"></i>
                    </button>
                </td>
            </tr>
            <tr th:if="${influencers.content.isEmpty()}">
                <td colspan="6" class="text-center text-muted py-4">No influencers yet</td>
            </tr>
            </tbody>
        </table>
    </div>

    <nav class="mt-3" th:if="${influencers.totalPages > 1}">
        <ul class="pagination">
            <li class="page-item" th:each="p : ${#numbers.sequence(0, influencers.totalPages - 1)}"
                th:classappend="${p == influencers.number} ? 'active'">
                <a class="page-link" th:href="@{/admin/influencers(search=${search}, page=${p})}" th:text="${p + 1}">1</a>
            </li>
        </ul>
    </nav>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script>
    function deleteInfluencer(id) {
        if (!confirm('Delete this influencer and all of their click history?')) return;
        fetch('/api/influencers/' + id, {
            method: 'DELETE',
            headers: {'X-XSRF-TOKEN': getCookie('XSRF-TOKEN')}
        }).then(r => { if (r.ok) location.reload(); else alert('Failed to delete'); });
    }
    function getCookie(name) {
        const v = document.cookie.match('(^|;)\\s*' + name + '\\s*=\\s*([^;]+)');
        return v ? v.pop() : '';
    }
</script>
</body>
</html>
